<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>The Easy Cook</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #f1f5f9; padding: 24px; text-align: center;
  }
  h1 { font-size: 2rem; margin: 0 0 4px; }
  .sub { color: #94a3b8; margin: 0 0 32px; font-size: 1rem; }
  .cards { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; width: 100%; max-width: 640px; }
  a.card {
    flex: 1 1 240px; text-decoration: none; color: inherit;
    background: #1e293b; border: 1px solid #334155; border-radius: 16px;
    padding: 28px 24px; transition: transform .12s ease, border-color .12s ease;
  }
  a.card:hover { transform: translateY(-3px); border-color: #f97316; }
  a.card .emoji { font-size: 2.4rem; display: block; margin-bottom: 10px; }
  a.card .name { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
  a.card .desc { color: #94a3b8; font-size: .9rem; line-height: 1.4; }
  .prod .name { color: #f97316; }
  .demo .name { color: #38bdf8; }
  footer { margin-top: 36px; color: #64748b; font-size: .8rem; }
</style>
</head>
<body>
  <h1>🍳 The Easy Cook</h1>
  <p class="sub">Gestión para restaurantes — elige una versión</p>
  <div class="cards">
    <a class="card prod" href="app/the-easy-cook-V4.html">
      <span class="emoji">🏪</span>
      <div class="name">Producción</div>
      <div class="desc">La app real para el día a día de tu restaurante.</div>
    </a>
    <a class="card demo" href="app/the-easy-cook-V4-DEMO.html">
      <span class="emoji">🎬</span>
      <div class="name">Demo</div>
      <div class="desc">Versión de demostración con datos de ejemplo, para mostrar a clientes.</div>
    </a>
  </div>
  <footer>Los datos se guardan en el navegador de cada dispositivo (localStorage).</footer>
</body>
</html>
